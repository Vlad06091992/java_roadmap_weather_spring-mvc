<!DOCTYPE html>
<!-- saved from url=(0067)https://zhukovsd.github.io/weather-viewer-html-layouts/sign-up.html -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div id="in-page-channel-node-id" data-channel-name="in_page_channel_8dnI-5"></div><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <title>Weather Viewer – Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    </style>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign Up</h2>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <form th:action="@{/register}"  method="post" class="mt-4">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required="" value="">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required="" value="">
                </div>
                <div class="mb-3">
                    <label for="repeat-password" class="form-label">Repeat password</label>
                    <input type="password" class="form-control" id="repeat-password" name="repeatedPassword" required="" value="">
                </div>

                <input type="hidden" name="redirect_to" value="http://localhost/">

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
                <p class="mt-2 text-center">Already have an account? <a href="https://zhukovsd.github.io/weather-viewer-html-layouts/sign-up.html#">Sign in here</a></p>
            </form>
        </div>
    </div>
</div>

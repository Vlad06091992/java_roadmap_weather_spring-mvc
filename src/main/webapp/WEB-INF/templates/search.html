<!DOCTYPE html>
<!-- saved from url=(0074)https://zhukovsd.github.io/weather-viewer-html-layouts/search-results.html -->
<html lang="en">
<div id="in-page-channel-node-id" data-channel-name="in_page_channel_Tp4Dx5"></div>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <title>Weather Viewer – Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="https://zhukovsd.github.io/weather-viewer-html-layouts/search-results.html#">
            <img th:src="@{/images/weather-app.png}" alt="" width="30" height="24"
                 class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-danger">Sign out</button>
        </form>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">
        <form th:action="@{/search-location}" method="get" class="mt-4">
            <div class="d-flex my-4 gap-3">
                <div class="d-flex flex-grow-1">
                    <div class="input-group">
                        <input class="form-control" type="text" name="locationName" placeholder="Enter location"
                               value="San Francisco" required="">

                        <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                                onclick="this.previousElementSibling.value=&#39;&#39;">
                            ×
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-outline-success">Search</button>
            </div>
        </form>
        <div class="row">
            <div th:if="${locations.size > 0}">
                <div th:each="location : ${locations}" class="col-12 col-lg-3 col-md-6 mb-4">
                    <form th:action="@{/add-location}" th:object="${location}" method="post">
                        <div class="card h-100">
                            <div class="card-body d-flex flex-column">
                                <h5 th:text="${location.name}" class="card-title"></h5>
                                <p th:text="'Latitude: ' + ${location.latitude}" class="card-text mb-1"></p>
                                <p th:text="'Longitude: ' + ${location.longitude}" class="card-text mb-1"></p>
                                <p th:text="'Country: ' + ${location.country}" class="card-text mb-1"></p>
                                <p th:text="'State: ' + ${location.state}" class="card-text mb-3"></p>

                                <div class="d-grid gap-2 d-md-block">
                                    <input name="name" id="name" th:value="${location.name}" type="hidden"/>
                                    <input name="longitude" id="longitude" th:value="${location.longitude}"
                                           type="hidden"/>
                                    <input name="latitude" id="latitude" th:value="${location.latitude}" type="hidden"/>
                                    <input name="country" id="country" th:value="${location.country}" type="hidden"/>
                                    <input name="state" id="state" th:value="${location.state}" type="hidden"/>
                                </div>

                                <div class="mt-auto">
                                    <button class="btn btn-primary w-100">Add</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    </div>
</section>

<footer class="page_footer d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4">
        <span>© Weather Viewer, project from <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.</span>
    </div>
</footer>
</body>
</html>
